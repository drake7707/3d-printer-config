[delayed_gcode _DEFAULT_EBAY_FANS]
initial_duration: 1
gcode:
    EBAY_FANS_IDLE


[gcode_macro EBAY_FANS_IDLE]
gcode:
	SET_FAN_SPEED FAN=ebay_fan1 SPEED=0.5
    SET_FAN_SPEED FAN=ebay_fan2 SPEED=0.5
    SET_FAN_SPEED FAN=ebay_fan_psu SPEED=0.5

[gcode_macro EBAY_FANS_OFF]
gcode:
	SET_FAN_SPEED FAN=ebay_fan1 SPEED=0.0
    SET_FAN_SPEED FAN=ebay_fan2 SPEED=0.0
    SET_FAN_SPEED FAN=ebay_fan_psu SPEED=0.0

[gcode_macro EBAY_FANS_PRINTING]
gcode:
	SET_FAN_SPEED FAN=ebay_fan1 SPEED=1.0
    SET_FAN_SPEED FAN=ebay_fan2 SPEED=1.0
    SET_FAN_SPEED FAN=ebay_fan_psu SPEED=1.0    
