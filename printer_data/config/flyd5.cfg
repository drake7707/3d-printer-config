[mcu FlyD5]
canbus_uuid: 0a0b883c0fb5
canbus_interface: can1



[temperature_sensor FlyD5]
sensor_type: temperature_mcu
sensor_mcu: FlyD5


[extruder_stepper feeder0]
extruder: extruder
step_pin: FlyD5:PC15
dir_pin: !FlyD5:PC14
enable_pin: !FlyD5:PC2
microsteps: 16
rotation_distance: 40


[extruder_stepper feeder1]
extruder: extruder1
step_pin: FlyD5:PA1
dir_pin: !FlyD5:PA0
enable_pin: !FlyD5:PA2
microsteps: 16
rotation_distance: 40

[extruder_stepper feeder2]
extruder: extruder2
step_pin: FlyD5:PA5
dir_pin: !FlyD5:PA4
enable_pin: !FlyD5:PA6
microsteps: 16
rotation_distance: 40

[extruder_stepper feeder3]
extruder: extruder3
step_pin: FlyD5:PC5
dir_pin: !FlyD5:PC4
enable_pin: !FlyD5:PB0
microsteps: 16
rotation_distance: 40

[extruder_stepper feeder4]
extruder: extruder4
step_pin: FlyD5:PB10
dir_pin: !FlyD5:PB2
enable_pin: !FlyD5:PB11
microsteps: 16
rotation_distance: 40


[filament_switch_sensor feeder0_filament_runout]
switch_pin: ^!FlyD5:PC10
pause_on_runout: false
insert_gcode:
runout_gcode:

[filament_switch_sensor feeder1_filament_runout]
switch_pin: ^!FlyD5:PC11
pause_on_runout: false
insert_gcode:
runout_gcode:

[filament_switch_sensor feeder2_filament_runout]
switch_pin: ^!FlyD5:PA13
pause_on_runout: false
insert_gcode:
runout_gcode:

[filament_switch_sensor feeder3_filament_runout]
switch_pin: ^!FlyD5:PC14
pause_on_runout: false
insert_gcode:
runout_gcode:

[filament_switch_sensor feeder4_filament_runout]
switch_pin: ^!FlyD5:PC15
pause_on_runout: false
insert_gcode:
runout_gcode:


